name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Match the npm version used to generate package-lock.json. npm 11 omits
      # wasm-fallback optional deps (@emnapi/*) from the lockfile's packages
      # section, which older npm rejects during `npm ci`. Pinning keeps the
      # lockfile and the installer in sync.
      - name: Pin npm version
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows executables
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
          generate_release_notes: true
